<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Calculator</title>
  </head>
  <body>
    <div class="container">
      <div class="frame">
        <div class="calDisplay">
          <textarea class="formDisplay" readonly>...</textarea>
        </div>
        <div class="btnList">
          <button class="vBtn" id="one">1</button>
          <button class="vBtn" id="two">2</button>
          <button class="vBtn" id="three">3</button>
          <button class="vBtn" id="four">4</button>
          <button class="vBtn" id="five">5</button>
          <button class="vBtn" id="six">6</button>
          <button class="vBtn" id="seven">7</button>
          <button class="vBtn" id="eight">8</button>
          <button class="vBtn" id="nine">9</button>
          <button class="vBtn" id="zero">0</button>
        </div>
        <div class="btnOp">
          <button id="add">+</button>
          <button id="subtract">-</button>
          <button id="multiply">X</button>
          <button id="divide">/</button>
          <button id="operator">=</button>
          <button id="clear">C</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
